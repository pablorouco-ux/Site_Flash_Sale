<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natura - Flash Sale</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        natura: { orange: '#FF6B00', orange_hover: '#E66000', light: '#FFF5F0', gray: '#F4F4F4' },
                        app: '#F8FAFC',
                        card: '#FFFFFF',
                        mainText: '#1F2937',
                        secondaryText: '#64748B',
                        muted: '#9CA3AF'
                    },
                    fontFamily: {
                        sans: ['NaturaAndCo', 'Inter', 'sans-serif'],
                        heading: ['Montserrat', 'Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #F8FAFC; color: #1F2937; font-family: 'Inter', sans-serif; }
        /* Forzar primera letra en mayúscula para las descripciones */
        .product-description::first-letter {
            text-transform: uppercase;
        }
        .swal2-popup.natura-swal { border-radius: 1.5rem !important; font-family: 'Inter', sans-serif; }
        /* Ocultar scrollbar de categorías */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased min-h-screen">

    <nav class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="category-filters" class="flex items-center space-x-8 overflow-x-auto py-4 scrollbar-hide">
                </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div id="loading-state" class="flex flex-col items-center justify-center py-20">
            <div class="w-12 h-12 rounded-full border-4 border-gray-100 border-t-natura-orange animate-spin mb-4"></div>
            <p class="text-secondaryText animate-pulse font-medium">Cargando catálogo...</p>
        </div>

        <div id="products-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

        <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-center">
            <i data-lucide="package-open" class="text-muted w-16 h-16 mb-4"></i>
            <h2 class="text-xl font-medium text-mainText mb-2">No se encontraron productos</h2>
            <p class="text-secondaryText">Intenta seleccionando otra categoría.</p>
        </div>

    </main>

    <script>
        lucide.createIcons();

        let allProducts = [];
        let uniqueCategories = [];

        document.addEventListener('DOMContentLoaded', () => {
            fetchProductsData();
        });

        function fetchProductsData() {
            Papa.parse("./productos.csv", {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allProducts = results.data;
                    if (allProducts.length > 0) {
                        processDataAndRender();
                        document.getElementById('loading-state').classList.add('hidden');
                    } else {
                        showError("El catálogo está vacío.");
                    }
                },
                error: function(err) {
                    console.error("Error cargando productos:", err);
                    showError("Estamos actualizando las ofertas. Por favor, intenta nuevamente más tarde.");
                }
            });
        }

        function showError(mensaje) {
            document.getElementById('loading-state').classList.add('hidden');
            Swal.fire({
                icon: 'warning',
                title: 'Catálogo no disponible',
                text: mensaje,
                confirmButtonColor: '#FF6B00',
                customClass: { popup: 'natura-swal' }
            });
        }

        function processDataAndRender() {
            // Normalización para unificar categorías y quitar tildes
            const cats = new Set(allProducts.map(p => {
                let cat = p['Categoria'];
                return cat ? cat.normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().toLowerCase() : '';
            }).filter(c => c !== ''));
            
            uniqueCategories = ['todas', ...cats];
            renderFilters();
            renderProducts(allProducts);
        }

        function renderFilters() {
            const container = document.getElementById('category-filters');
            container.innerHTML = '';

            uniqueCategories.forEach((cat, index) => {
                const btn = document.createElement('button');
                // Capitalize en el texto del botón
                btn.innerText = cat.charAt(0).toUpperCase() + cat.slice(1);
                btn.className = `whitespace-nowrap pb-1 pt-1 font-medium text-sm transition-colors border-b-[3px] 
                    ${index === 0 ? 'border-natura-orange text-natura-orange' : 'border-transparent text-secondaryText hover:text-mainText'}`;
                
                btn.addEventListener('click', () => {
                    Array.from(container.children).forEach(cb => {
                        cb.classList.remove('border-natura-orange', 'text-natura-orange');
                        cb.classList.add('border-transparent', 'text-secondaryText');
                    });
                    btn.classList.remove('border-transparent', 'text-secondaryText');
                    btn.classList.add('border-natura-orange', 'text-natura-orange');

                    if (cat === 'todas') {
                        renderProducts(allProducts);
                    } else {
                        renderProducts(allProducts.filter(p => {
                            let itemCat = p['Categoria'];
                            let norm = itemCat ? itemCat.normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().toLowerCase() : '';
                            return norm === cat;
                        }));
                    }
                });
                container.appendChild(btn);
            });
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            const emptyState = document.getElementById('empty-state');
            grid.innerHTML = '';

            if (products.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            emptyState.classList.add('hidden');
            grid.classList.remove('hidden');

            products.forEach(item => {
                const stock = parseInt(item['Stock']) || 0;
                const isOutOfStock = stock <= 0;
                
                const card = document.createElement('article');
                card.className = `group bg-card border border-gray-100 rounded-2xl p-4 transition-all duration-300 shadow-sm
                                ${isOutOfStock ? 'opacity-60 grayscale-[50%]' : 'hover:-translate-y-1 hover:shadow-md'}`;

                const fallbackImg = "https://placehold.co/400x400/F4F4F4/9CA3AF?text=Imagen+No+Disponible";
                const imgSrc = `./Imagenes/${item['SKU']}.jpg`;
                const marcaText = (item['Marca'] || 'Natura').toUpperCase();
                
                // Limpieza de marca en la descripción
                let descLimpia = (item['Descripcion Revista'] || '').replace(new RegExp(item['Marca'], 'ig'), '').trim();
                descLimpia = descLimpia.replace(/\s+/g, ' '); 

                const precio = item['Vos Pagas'] ? `$${item['Vos Pagas']}` : 'Consulte';
                const puntos = item['Puntos'] ? `${item['Puntos']} pts` : '';

                card.innerHTML = `
                    <div class="relative w-full aspect-square bg-natura-gray rounded-xl overflow-hidden mb-4">
                        <img src="${imgSrc}" 
                             onerror="this.onerror=null;this.src='${fallbackImg}';" 
                             alt="${descLimpia}" 
                             class="w-full h-full object-cover mix-blend-multiply" />
                        
                        ${!isOutOfStock ? `
                        <div class="absolute top-0 right-0 bg-white/90 backdrop-blur-sm text-mainText text-[10px] font-bold px-2 py-1 rounded-bl-xl border-l border-b border-gray-100">
                            Stock: ${stock} ud.
                        </div>
                        ` : `
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center backdrop-blur-[1px]">
                            <span class="bg-card text-mainText font-semibold px-4 py-2 rounded-xl text-sm shadow-lg tracking-tight">Sin Stock</span>
                        </div>
                        `}
                    </div>

                    <div class="space-y-1">
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] tracking-widest font-semibold text-secondaryText">${marcaText}</span>
                            <span class="text-xs font-medium bg-natura-light text-natura-orange px-2 py-1 rounded-md">
                                SKU: ${item['SKU']}
                            </span>
                        </div>
                        
                        <h3 class="product-description text-sm font-medium text-mainText line-clamp-2 min-h-[2.5rem] lowercase">
                            ${descLimpia}
                        </h3>
                        
                        <div class="pt-3 border-t border-gray-100 mt-2 flex items-center justify-between">
                            <div class="flex flex-col">
                                <span class="text-[10px] text-secondaryText uppercase tracking-widest">Vos Pagas</span>
                                <span class="text-lg font-semibold text-natura-orange">${precio}</span>
                            </div>
                            <div class="flex flex-col items-end">
                                <span class="text-[10px] text-secondaryText uppercase tracking-widest">Valor</span>
                                <span class="text-sm font-medium text-mainText">${puntos}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }
    </script>
</body>
</html>
